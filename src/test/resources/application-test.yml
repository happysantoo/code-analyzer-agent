# Test profile: embedded H2, no Docker. Relational schema only; vector store is stubbed.
spring:
  datasource:
    url: jdbc:h2:mem:codeanalyzer;DB_CLOSE_DELAY=-1;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    username: sa
    password:
    driver-class-name: org.h2.Driver
  flyway:
    locations: classpath:db/migration-h2
  autoconfigure:
    exclude:
      # Avoid pgvector autoconfig when running tests with H2
      - org.springframework.ai.vectorstore.pgvector.autoconfigure.PgVectorStoreAutoConfiguration
