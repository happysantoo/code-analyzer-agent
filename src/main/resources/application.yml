codeanalyzer:
  clone:
    # Base directory for temporary clone checkouts (default: system temp dir).
    # Override with CODEANALYZER_CLONE_TEMP_DIR or codeanalyzer.clone.temp-dir.
    temp-dir: ${CODEANALYZER_CLONE_TEMP_DIR:}

spring:
  application:
    name: code-analyzer-agent
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/codeanalyzer}
    username: ${DATABASE_USERNAME:postgres}
    password: ${DATABASE_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  ai:
    vectorstore:
      pgvector:
        initialize-schema: true
    # Embedding model config placeholder — set in env or profile
    # openai:
    #   api-key: ${OPENAI_API_KEY}

server:
  port: ${SERVER_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized

# Logging: see what the app is doing (e.g. analyze_repository flow)
logging:
  level:
    root: INFO
    com.vajrapulse.agents.codeanalyzer: INFO
    org.springframework.web.servlet.mvc.method.annotation.RequestMappingHandlerMapping: INFO
  pattern:
    console: "%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
