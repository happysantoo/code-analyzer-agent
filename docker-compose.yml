services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: codeanalyzer-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: codeanalyzer
    ports:
      - "5432:5432"
    volumes:
      - codeanalyzer_pgdata:/var/lib/postgresql/data
      # Ensures vector extension in codeanalyzer on first start
      - ./docker/init-pgvector.sql:/docker-entrypoint-initdb.d/01-pgvector.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d codeanalyzer"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  codeanalyzer_pgdata:
